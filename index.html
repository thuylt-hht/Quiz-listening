<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Listening Test</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

.quiz-container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
}

.answer-btn{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.answer-btn:hover{
    background:#2980b9;
}

#nextBtn{
    background:green;
    margin-top:20px;
}

#score{
    font-size:24px;
    color:green;
}

</style>
</head>

<body>

<div class="quiz-container">

<h2 id="question">Question</h2>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">
Next Question
</button>

<h3 id="progress"></h3>

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

const q = quiz[currentQuestion];

document.getElementById("question").innerHTML =
q.question;

document.getElementById("progress").innerHTML =
`Question ${currentQuestion + 1} / ${quiz.length}`;

let answersHTML = "";

q.answers.forEach((answer,index)=>{

answersHTML += `
<button class="answer-btn"
onclick="checkAnswer(${index})">
${answer}
</button>
`;

});

document.getElementById("answers").innerHTML =
answersHTML;

}

function checkAnswer(index){

const q = quiz[currentQuestion];

const buttons =
document.querySelectorAll(".answer-btn");

buttons.forEach((btn,i)=>{

btn.disabled = true;

if(i === q.correct){

btn.style.background = "green";

}else if(i === index){

btn.style.background = "red";

}

});

if(index === q.correct){

score++;

}

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){

loadQuestion();

}else{

document.querySelector(".quiz-container").innerHTML =
`
<h1>🎉 Hoàn thành bài quiz</h1>

<h2 id="score">
Điểm của bạn: ${score}/${quiz.length}
</h2>
`;

}

}

loadQuestion();

</script>
